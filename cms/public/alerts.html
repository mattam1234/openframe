<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenFrame — Alerts</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>OpenFrame Fleet</h1>
    <nav class="nav">
      <a href="/">Fleet</a>
      <a href="topology.html">Topology</a>
      <a href="provision.html">Provision</a>
      <a href="templates.html">Templates</a>
      <a href="firmware.html">Firmware</a>
      <a href="alerts.html" class="active">Alerts <span id="nav-badge" class="badge hidden">0</span></a>
    </nav>
    <div class="conn" id="conn"><span class="dot"></span><span id="conn-text">connecting…</span></div>
  </header>

  <main>
    <h2 class="section-h">Active</h2>
    <table id="active-table">
      <thead><tr><th></th><th>Device</th><th>Type</th><th>Message</th><th>Since</th></tr></thead>
      <tbody id="active-rows"></tbody>
    </table>
    <p id="active-empty" class="empty">No active alerts. 🎉</p>

    <h2 class="section-h">Recent</h2>
    <table id="recent-table">
      <thead><tr><th></th><th>Device</th><th>Type</th><th>Message</th><th>Raised</th><th>Resolved</th></tr></thead>
      <tbody id="recent-rows"></tbody>
    </table>
    <p id="recent-empty" class="empty">No alert history yet.</p>
  </main>

  <script src="auth.js"></script>
  <script src="alerts.js"></script>
</body>
</html>
