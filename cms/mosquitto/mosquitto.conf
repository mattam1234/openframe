# Minimal LAN-trusted broker config for the bundled OpenFrame CMS.
#
# Anonymous access is enabled for zero-config first run on a trusted LAN. For a
# hardened deployment, set `allow_anonymous false`, add a password_file, and set
# MQTT_USERNAME / MQTT_PASSWORD on the cms service (and on each device).
listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
