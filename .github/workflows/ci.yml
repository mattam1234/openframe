name: CI

# Build every firmware target, the Vue frontend, and run the CMS test suite on
# each push and pull request so a broken build is caught before merge.
on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware:
    name: firmware (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [esp32dev, esp32s3dev, esp8266dev]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache the PlatformIO core, toolchains, and downloaded libraries — the
      # bulk of a cold firmware build is fetching these.
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ matrix.env }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-${{ matrix.env }}-
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build ${{ matrix.env }}
        working-directory: firmware
        run: pio run -e ${{ matrix.env }}

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx eslint . --ext .vue,.js

      - name: Unit tests (Vitest)
        working-directory: frontend
        run: npm run test:unit

      - name: Build
        working-directory: frontend
        run: npm run build

      # Catch oversized UI assets before they break a LittleFS flash (#94).
      - name: Check LittleFS size budget
        run: node firmware/tools/check-fs-size.mjs

  e2e:
    name: frontend e2e (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      # Cache the Playwright browser download, keyed on the installed version.
      - name: Resolve Playwright version
        id: pw
        working-directory: frontend
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      # CMS Vue UI E2E — reuses the Chromium installed above.
      - name: Install CMS web UI
        working-directory: cms/web
        run: npm ci

      - name: CMS web E2E tests
        working-directory: cms/web
        run: npm run test:e2e

      - name: Upload CMS report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cms-playwright-report
          path: cms/web/playwright-report
          retention-days: 7

  audit:
    name: npm audit (${{ matrix.dir }})
    runs-on: ubuntu-latest
    # Advisory signal only — a vulnerable transitive dep with no fix yet should
    # surface, not block unrelated PRs. Dependabot opens the remediation PRs.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        dir: [frontend, cms]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Audit
        working-directory: ${{ matrix.dir }}
        run: npm audit --audit-level=high

  cms:
    name: cms typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cms/package-lock.json

      - name: Install
        working-directory: cms
        run: npm ci

      - name: Lint
        working-directory: cms
        run: npm run lint

      - name: Typecheck
        working-directory: cms
        run: npm run typecheck

      - name: Test
        working-directory: cms
        run: npm test

      # The CMS Vue UI (cms/web) — lint + unit tests for its pure logic.
      - name: Install web UI
        working-directory: cms/web
        run: npm ci

      - name: Lint web UI
        working-directory: cms/web
        run: npm run lint

      - name: Web UI unit tests
        working-directory: cms/web
        run: npm run test:unit
