; OpenFrame — PlatformIO Configuration
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev
src_dir = src
data_dir = data

; ── Shared settings ────────────────────────────────────────────────────────────
[env]
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
    -fpermissive

; Common libs shared by all platforms (AsyncTCP variant is added per-env below)
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    mathieucarbou/ESP Async WebServer@^3.0.0
    ayushsharma82/ElegantOTA@^3.1.0
    fastled/FastLED@^3.6.0
    adafruit/Adafruit SSD1306@^2.5.0
    adafruit/Adafruit GFX Library@^1.11.0
    adafruit/Adafruit BME280 Library@^2.2.0
    adafruit/Adafruit BMP280 Library@^2.6.0
    adafruit/DHT sensor library@^1.4.0
    adafruit/Adafruit INA219@^1.2.0
    adafruit/Adafruit SHT31 Library@^2.2.0
    adafruit/Adafruit SH110X@^2.1.0
    adafruit/Adafruit MPU6050@^2.2.0
    adafruit/Adafruit ILI9341@^1.6.0
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.0
    claws/BH1750@^1.3.0
    adafruit/Adafruit SGP30 Sensor@^2.0.0
    adafruit/Adafruit_VL53L0X@^1.2.0
    adafruit/MAX6675 library@^1.1.0
    sensirion/Sensirion I2C SCD4x@^0.4.0
    milesburton/DallasTemperature@^3.11.0
    paulstoffregen/OneWire@^2.3.0
    knolleary/PubSubClient@^2.8.0
    ; U8g2 drives the 0.42" 72x40 SSD1306 panel, which the Adafruit driver can't
    ; init reliably. Only compiled where OF_ENABLE_U8G2 is set (ESP32 family).
    olikraus/U8g2@^2.35.19

; Prevent duplicate legacy async stack pulled as a transitive dependency
lib_ignore =
    ESPAsyncWebServer
    Async TCP

; ── ESP32 ───────────────────────────────────────────────────────────────────────
[env:esp32dev]
platform = espressif32
board = esp32dev
; huge_app (3 MB app) instead of no_ota's 2 MB: the Bluedroid BLE stack used for
; BLE-HID keyboard output doesn't fit alongside the rest in 2 MB.
board_build.partitions = huge_app.csv

build_flags =
    ${env.build_flags}
    -DESP32_BOARD
    -DBOARD_NAME=\"esp32dev\"
    ; Drive BLE-HID through NimBLE instead of Bluedroid: NimBLE's footprint is
    ; ~50 KB smaller, which is what lets BLE-HID coexist with WiFi-AP + the async
    ; web stack on this 320 KB-DRAM part. Without it the heap is exhausted by the
    ; end of setup() and AsyncTCP can't even start its task (crash loop).
    -DUSE_NIMBLE
    ; AsyncTCP's event-task stack defaults to 16 KB (8192*2), allocated as one
    ; contiguous heap block. Halve it to 8 KB — plenty for our request sizes and
    ; one less large allocation to satisfy on a tight heap.
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192

lib_deps =
    ${env.lib_deps}
    mathieucarbou/AsyncTCP@^3.0.0
    ; Pin NimBLE 1.4.x: 2.x changed the API and breaks ESP32-BLE-Keyboard 0.3.0.
    h2zero/NimBLE-Arduino@^1.4.0
    https://github.com/T-vK/ESP32-BLE-Keyboard.git#0.3.0
    ; NOTE: the HA WebSocket transport (OF_ENABLE_HA_WS) is OFF on classic esp32dev —
    ; its IRAM is already full (BLE-HID + WiFi + async web), so the WS client won't
    ; fit. It's enabled on the S3 family below. esp32dev uses the MQTT HA transport.

; ── ESP32-2432S028 "Cheap Yellow Display" (CYD) ─────────────────────────────────
; ESP32-WROOM-32 (no PSRAM, 4 MB flash) with an integrated 2.8" ILI9341 320x240
; SPI TFT + XPT2046 resistive toucth. It's a plain classic ESP32, so this env
; mirrors esp32dev exactly (same BLE-HID + partition + heap tuning) and only
; changes BOARD_NAME — DisplayManager seeds the panel's fixed wiring off that
; string (see appendBoardDefaultDisplays), so the screen lights up with no config.
; NOTE: no PSRAM, so the 150 KB full-screen TFT canvas can't be allocated — the
; ILI9341 provider falls back to drawing straight to the glass (functional, but
; per-frame redraws flicker). Touch (XPT2046) is not wired to a provider yet.
[env:esp32_2432s028]
platform = espressif32
board = esp32dev
board_build.partitions = huge_app.csv

build_flags =
    ${env.build_flags}
    -DESP32_BOARD
    -DBOARD_NAME=\"esp32_2432s028\"
    -DUSE_NIMBLE
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192

lib_deps =
    ${env.lib_deps}
    mathieucarbou/AsyncTCP@^3.0.0
    h2zero/NimBLE-Arduino@^1.4.0
    https://github.com/T-vK/ESP32-BLE-Keyboard.git#0.3.0

; ── ESP32-S3 ────────────────────────────────────────────────────────────────────
[env:esp32s3dev]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.partitions = openframe_16mb.csv
board_upload.flash_size = 16MB

build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    -DESP32S3_BOARD
    -DBOARD_NAME=\"esp32s3dev\"
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ${env.lib_deps}
    mathieucarbou/AsyncTCP@^3.0.0
    links2004/WebSockets@^2.4.0

; ── ESP32-S3-GEEK (Waveshare, ESP32-S3R2: 16MB flash + 2MB QSPI PSRAM) ───────────
[env:esp32s3geek]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.partitions = openframe_16mb.csv
board_upload.flash_size = 16MB
; R2 PSRAM is QSPI (quad), not OPI — devkitc-1 defaults to OPI and fails to init.
board_build.arduino.memory_type = qio_qspi

build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    -DESP32S3_BOARD
    -DBOARD_NAME=\"esp32s3geek\"
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ${env.lib_deps}
    mathieucarbou/AsyncTCP@^3.0.0
    links2004/WebSockets@^2.4.0

; ── ESP32-C3 (ESP32-C3: 4MB flash) ─────────────────────────────────────────────
[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
board_upload.flash_size = 4MB
; 4 MB can't fit twin OTA slots + the web UI, so use a single-app layout that
; leaves ~1.9 MB for LittleFS (firmware OTA off; reflash over USB-CDC).
board_build.partitions = openframe_4mb.csv
; Run the core at 80 MHz instead of the 160 MHz default: roughly halves CPU power
; draw and heat on this single-core board (WiFi has its own radio clock, so
; throughput is unaffected). A key stability lever when the C3 runs hot / the
; supply is marginal — see WiFi TX-power cap and modem sleep in WiFiManager.
board_build.f_cpu = 80000000L

; Constrained single-core target: silence the verbose SDK trace (level 3 → 0) and
; optimise for size — flash is the binding constraint here (~81% full).
build_unflags =
    -DCORE_DEBUG_LEVEL=3

build_flags =
    ${env.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -Os
    -DESP32C3_BOARD
    -DBOARD_NAME=\"esp32c3\"
    ; Native USB CDC on boot (C3 has no USB-OTG, only the serial/JTAG CDC)
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    ${env.lib_deps}
    mathieucarbou/AsyncTCP@^3.0.0

; ── ESP32-S3-Box (ESP32-S3: 16MB flash + 8MB OPI PSRAM) ─────────────────────────
[env:esp32s3box]
platform = espressif32
board = esp32s3box
board_build.partitions = openframe_16mb.csv
board_upload.flash_size = 16MB

build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    -DESP32S3_BOARD
    -DBOARD_NAME=\"esp32s3box\"
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ${env.lib_deps}
    mathieucarbou/AsyncTCP@^3.0.0
    links2004/WebSockets@^2.4.0

; ── ESP8266 ─────────────────────────────────────────────────────────────────────
[env:esp8266dev]
platform = espressif8266
board = d1_mini
upload_speed = 460800
; Run the core at 160 MHz — the cooperative loop + async stack are CPU-bound on
; this single-core 80 MHz part; doubling the clock roughly halves loop latency.
board_build.f_cpu = 160000000L

; Tightest target (RAM ~69% at boot, flash ~89%): drop SDK trace to 0 and -Os.
build_unflags =
    -DCORE_DEBUG_LEVEL=3

build_flags =
    ${env.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -Os
    -DESP8266_BOARD
    -DBOARD_NAME=\"esp8266dev\"

lib_deps =
    ${env.lib_deps}
    esphome/ESPAsyncTCP-esphome@^2.0.0
